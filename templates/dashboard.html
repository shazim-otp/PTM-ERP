<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
{% include 'sidebar.html' %}

<div class="main">
<div class="card">

<h2>Add Data</h2>

{% if request.args.get('success') %}
<div class="success-alert" style="background: #15803d; color: white; padding: 12px; border-radius: 8px; margin: 10px 0 15px 0; font-weight: 500; font-size: 14px; text-align: center;">
    Successfully added new {{ request.args.get('added_type', 'record') }}!
</div>
{% endif %}

<form method="post" enctype="multipart/form-data">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<select name="type" id="type" onchange="toggleFields()">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<input name="name" placeholder="Name" required>

<!-- TEACHER -->
<div id="teacherFields" style="display:none;">
<input name="subject" placeholder="Subject">
<input type="password" name="password" placeholder="Password (default: 1234)">
</div>

<!-- STUDENT -->
<div id="studentFields">

<input name="father_name" placeholder="Father Name" required>
<input name="mother_name" placeholder="Mother Name" required>

<input name="phone_father" placeholder="Father Phone" required>
<input name="phone_mother" placeholder="Mother Phone" required>
<input name="phone_student" placeholder="Student Phone">

<input name="register_no" placeholder="Register Number">
<input name="admission_no" placeholder="Admission Number">
<input name="adhar_no" placeholder="Aadhaar Number">

<div style="display: flex; gap: 15px;">
    <input name="bank_acc_no" placeholder="Bank Account Number" style="flex: 1;">
    <input name="ifsc_code" placeholder="IFSC Code (Optional)" style="flex: 1;">
</div>

<select name="batch_id" required>
    <option value="" disabled>Select Academic Batch</option>
    {% for b in batches %}
    <option value="{{ b.id }}" {% if b.is_active %}selected{% endif %}>{{ b.batch_name }} {% if b.is_active %}(Active){% endif %}</option>
    {% endfor %}
</select>

<input name="class" placeholder="Class">

<select name="stream">
<option value="science">Science</option>
<option value="commerce">Commerce</option>
</select>

<select name="category">
<option value="cs">CS</option>
<option value="bio">Bio</option>
<option value="maths">Maths</option>
<option value="ca">CA</option>
</select>

<select name="admission_type">
<option value="" disabled selected>Select Type of Admission (General/Community/Management)</option>
<option value="general">General</option>
<option value="community">Community</option>
<option value="management">Management</option>
</select>

<select name="caste_category">
<option value="" disabled selected>Select Caste Category (General/SC/ST/OBC)</option>
<option value="general">General</option>
<option value="sc">SC</option>
<option value="st">ST</option>
<option value="obc">OBC</option>
</select>

<input name="co_curricular" placeholder="Co-Curricular Activities">

<select name="nss_scouts_jrc_lk">
<option value="" disabled selected>Select NSS/Scouts/JRC/Little Kites Participation</option>
<option value="none">None / No Participation</option>
<option value="nss">NSS</option>
<option value="scouts">Scouts</option>
<option value="jrc">JRC</option>
<option value="little_kites">Little Kites</option>
</select>

<input name="state_level_participation" placeholder="State Level Participation (Arts/Sports/Science)">

<div class="image-source-toggle" style="margin-top: 15px;">
<label style="display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8;">Profile Picture Source</label>
<div style="display: flex; gap: 15px; margin-bottom: 10px;">
    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-primary); margin: 0; font-size: 14px;">
        <input type="radio" name="img_source" value="upload" checked onchange="toggleImageSource()" style="width: auto; margin: 0;"> Upload File
    </label>
    <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-primary); margin: 0; font-size: 14px;">
        <input type="radio" name="img_source" value="camera" onchange="toggleImageSource()" style="width: auto; margin: 0;"> Use Webcam
    </label>
</div>
</div>

<div id="imageUploadArea">
<input type="file" name="image" accept="image/*">
</div>

<div id="imageCameraArea" style="display: none; text-align: center; border: 1px solid var(--glass-border); padding: 15px; border-radius: 12px; background: rgba(0, 0, 0, 0.15); margin-top: 8px;">
<video id="webcam" autoplay playsinline muted style="width: 100%; max-width: 280px; height: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #000;"></video>
<canvas id="canvas" style="display: none;"></canvas>

<div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
    <button type="button" class="button" id="startCamBtn" onclick="startWebcam()" style="margin: 0; width: auto; padding: 8px 15px;"><i class="fa-solid fa-video me-1"></i> Start Camera</button>
    <button type="button" class="button" id="captureBtn" onclick="capturePhoto()" style="margin: 0; width: auto; padding: 8px 15px; background: var(--success) !important; display: none;"><i class="fa-solid fa-camera me-1"></i> Capture</button>
</div>

<div id="capturePreviewArea" style="display: none; margin-top: 15px;">
    <p class="small text-success" style="margin-bottom: 5px;"><i class="fa-solid fa-circle-check"></i> Photo Captured!</p>
    <img id="capturePreview" style="max-width: 140px; height: auto; border: 2px solid var(--success); border-radius: 8px;">
</div>
</div>
<input type="hidden" name="captured_image" id="captured_image">

</div>

<textarea name="details" placeholder="Details"></textarea>

<button class="button">Add</button>

</form>

</div>
</div>

<script>

function toggleFields(){
let t=document.getElementById("type").value;
let isStudent = (t=="student");

document.getElementById("studentFields").style.display=isStudent?"block":"none";
document.getElementById("teacherFields").style.display=!isStudent?"block":"none";

if (!isStudent) {
    stopWebcam();
}

// Toggle all student fields
let studentInputs = document.getElementById("studentFields").querySelectorAll("input, select");
studentInputs.forEach(input => {
    input.disabled = !isStudent;
    if (input.name === "father_name" || input.name === "mother_name" || input.name === "phone_father" || input.name === "phone_mother") {
        input.required = isStudent;
    }
});

// Toggle all teacher fields
let teacherInputs = document.getElementById("teacherFields").querySelectorAll("input, select");
teacherInputs.forEach(input => {
    input.disabled = isStudent;
    if (input.name === "subject") {
        input.required = !isStudent;
    }
});
}

window.addEventListener("DOMContentLoaded", toggleFields);

// --- WEBCAM CAMERA INTEGRATION ---
let stream = null;

function toggleImageSource() {
    let source = document.querySelector('input[name="img_source"]:checked').value;
    let uploadArea = document.getElementById("imageUploadArea");
    let cameraArea = document.getElementById("imageCameraArea");
    
    if (source === "upload") {
        uploadArea.style.display = "block";
        cameraArea.style.display = "none";
        stopWebcam();
    } else {
        uploadArea.style.display = "none";
        cameraArea.style.display = "block";
    }
}

async function startWebcam() {
    let video = document.getElementById("webcam");
    let startBtn = document.getElementById("startCamBtn");
    let captureBtn = document.getElementById("captureBtn");
    
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
        video.srcObject = stream;
        video.muted = true;
        video.play();
        startBtn.style.display = "none";
        captureBtn.style.display = "inline-flex";
    } catch (err) {
        alert("Unable to access camera: " + err.message);
        console.error("Camera access error:", err);
    }
}

function capturePhoto() {
    let video = document.getElementById("webcam");
    let canvas = document.getElementById("canvas");
    let preview = document.getElementById("capturePreview");
    let previewArea = document.getElementById("capturePreviewArea");
    let hiddenInput = document.getElementById("captured_image");
    
    if (!stream) return;
    
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    
    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    let dataUrl = canvas.toDataURL("image/png");
    hiddenInput.value = dataUrl;
    
    preview.src = dataUrl;
    previewArea.style.display = "block";
}

function stopWebcam() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    let video = document.getElementById("webcam");
    if (video) {
        video.srcObject = null;
    }
    let startBtn = document.getElementById("startCamBtn");
    let captureBtn = document.getElementById("captureBtn");
    if (startBtn) startBtn.style.display = "inline-flex";
    if (captureBtn) captureBtn.style.display = "none";
}
</script>
</body>
</html>
